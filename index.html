    <h2>HAVE A LOOK AT MY CV AND REACH OUT TO ME</h2>

    <div class="video_form_wrapper">
      <div class="contacts">
        <div id="cv_container">
          <object
            data="CV.pdf"
            class="cv"
            type="application/pdf"
          >
            <p>
              Your browser does not support PDFs. Please download the PDF to
              view it: <a href="CV.pdf">Download CV</a>.
            </p>
          </object>
        </div>

        <div id="contacts_form">
          <form
            action="https://formspree.io/f/xqkrqrwl"
            method="POST"
          >
            <div class="container_contact">
              <div class="contact">
                <h3>SEND ME A MESSAGE!</h3>
              </div>
              <div class="contact">
                <label
                  >Your email:
                  <input
                    type="email"
                    name="_replyto"
                    class="email"
                    placeholder="your.email@example.com"
                  />
                </label>
              </div>
              <div class="contact">
                <label
                  >Your message:
                  <textarea
                    name="message"
                    class="textmessage"
                    placeholder="Write your message here..."
                  ></textarea>
                </label>
              </div>
              <div class="contact">
                <button
                  type="submit"
                  class="btn"
                >
                  SEND MESSAGE
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
